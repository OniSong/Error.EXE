      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sanitize and Fix Gradlew
        # This strips the hidden carriage returns (\r) that cause the syntax error
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        
