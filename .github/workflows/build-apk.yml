name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools and components
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          # Use the runner-provided temp directory
          ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$HOME"
          echo "Downloading Android commandline tools..."
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          else
            ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" || true
          fi
          rm -f cmdline-tools.zip
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "y" | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "Installed SDK components to ${ANDROID_SDK_ROOT}"
        shell: bash

      - name: Create local.properties
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "Created local.properties:"
          cat local.properties
        shell: bash

      - name: Show Java info
        run: |
          echo "JAVA_HOME=${JAVA_HOME:-not-set}"
          java -version
          javac -version
        shell: bash

      - name: Fix gradlew line endings, shebang, and permissions
        run: |
          set -euo pipefail
          if [ -f gradlew ]; then
            echo "Found gradlew, examining and fixing line endings/shebang/permissions..."
            # Remove CRLF if present
            sed -i 's/\r$//' gradlew
            # Ensure shebang is correct
            head -n 1 gradlew | grep -q '^#!' || {
              echo "Adding shebang to gradlew"
              sed -i '1i #!/usr/bin/env bash' gradlew
            }
            # Replace a wrong shebang with a portable one
            sed -i '1s|^#!.*|#!/usr/bin/env bash|' gradlew
            # Ensure executable
            chmod +x gradlew || true
            echo "gradlew head (first 8 lines):"
            sed -n '1,8p' gradlew || true
            echo "File mode:"
            ls -l gradlew || true
          else
            echo "gradlew not found in repo root. Skipping gradlew fix step."
          fi
        shell: bash

      - name: Debug gradlew (if errors persist)
        if: failure()
        run: |
          set -euo pipefail
          echo "===== gradlew diagnostics ====="
          [ -f gradlew ] || { echo "gradlew missing"; exit 0; }
          echo "Path: $(pwd)/gradlew"
          ls -l gradlew || true
          file gradlew || true
          echo "Head (first 20 lines):"
          sed -n '1,20p' gradlew || true
          echo "Lines 140-180:"
          sed -n '140,180p' gradlew || true
          echo "Has CRLF? (prints 'CRLF' if true):"
          if grep -q $'\r' gradlew; then echo "CRLF detected"; else echo "LF only"; fi
        shell: bash

      - name: Verify Gradle wrapper executable (run with bash)
        run: |
          set -euo pipefail
          # Explicitly run with bash to avoid /bin/sh dash parsing issues
          if [ -f gradlew ]; then
            bash ./gradlew -v
          else
            echo "gradlew not found; attempting to run 'gradle -v' if gradle is installed"
            gradle -v || true
          fi
        shell: bash

      - name: Build debug APK (run with bash)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          echo "Using ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          # Ensure gradlew uses bash interpreter
          if [ -f gradlew ]; then
            bash ./gradlew assembleDebug --no-daemon
          else
            echo "gradlew not found - cannot build with wrapper. You may need to include the Gradle wrapper in the repo."
            exit 1
          fi
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
