name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Fix Line Endings and Permissions
        # This fixes the "redirection unexpected" error caused by mobile/Windows line endings
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build debug APK
        # GitHub's runner already has the Android SDK pre-installed
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
