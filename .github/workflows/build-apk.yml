name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools and components
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          # Use the runner-provided temp directory
          ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$HOME"
          echo "Downloading Android commandline tools..."
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          else
            ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" || true
          fi
          rm -f cmdline-tools.zip
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "y" | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "Installed SDK components to ${ANDROID_SDK_ROOT}"
        shell: bash

      - name: Create local.properties
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "Created local.properties:"
          cat local.properties
        shell: bash

      - name: Show Java info
        run: |
          echo "JAVA_HOME=${JAVA_HOME:-not-set}"
          java -version
          javac -version
        shell: bash

      - name: Verify Gradle wrapper executable (run with bash)
        run: |
          set -euo pipefail
          chmod +x ./gradlew || true
          bash -lc "./gradlew -v"
        shell: bash

      - name: Build debug APK (run with bash)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          # Ensure Gradle sees the SDK at RUNNER_TEMP
          export ANDROID_SDK_ROOT="$RUNNER_TEMP/android-sdk"
          bash -lc "./gradlew assembleDebug --no-daemon"
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
