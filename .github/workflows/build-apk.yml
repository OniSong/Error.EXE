name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Use a per-run temp directory for Android SDK to avoid permission / cache issues
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK command-line tools and components
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$HOME"
          echo "Downloading Android commandline tools..."
          curl -sSfL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          # Some cmdline-tools zips create cmdline-tools/cmdline-tools — normalize to 'latest'
          if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          else
            # if already correct layout, place a 'latest' symlink for sdkmanager
            ln -sfn "$ANDROID_SDK_ROOT/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest" || true
          fi
          rm -f cmdline-tools.zip
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "y" | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "Installed SDK components"
        shell: bash

      - name: Create local.properties
        run: |
          set -euo pipefail
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "Created local.properties:"
          cat local.properties
        shell: bash

      - name: Show Java info
        run: |
          echo "JAVA_HOME=${JAVA_HOME:-not-set}"
          java -version
          javac -version
        shell: bash

      - name: Verify Gradle wrapper executable (run with bash)
        run: |
          set -euo pipefail
          chmod +x ./gradlew || true
          # Force bash to run the wrapper to avoid dash/sh interpreting bash-style redirections
          bash -lc "./gradlew -v"
        shell: bash

      - name: Build debug APK (run with bash)
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          bash -lc "./gradlew assembleDebug --no-daemon"
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
