name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build APK with Auto-Wrapper Fix
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          fi
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Find APK path
        id: find_apk
        run: |
          # Search everywhere for the debug apk
          APK_PATH=$(find . -type f -name "*-debug.apk" | grep -v "intermediates" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ ERROR: No APK was generated. Listing directory for debug:"
            ls -R
            exit 1
          fi
          
          echo "✅ Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          
