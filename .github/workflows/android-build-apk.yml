name: Minimal Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Basic Build
        run: |
          # 1. Clean up old JVM settings that crash Java 21
          if [ -f "gradle.properties" ]; then
            sed -i '/MaxPermSize/d' gradle.properties
          fi

          # 2. Re-create the Wrapper directory
          mkdir -p gradle/wrapper
          
          # 3. Create the properties file so Gradle knows what to download
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.12.1-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 4. Download the official wrapper JAR and the execution script
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradlew
          
          # 5. Make gradlew executable and fix line endings for Linux
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          
          # 6. Run the build
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/*.apk"
          
