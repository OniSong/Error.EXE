      - name: Basic Build
        run: |
          # 1. Clean up old JVM settings
          if [ -f "gradle.properties" ]; then
            sed -i '/MaxPermSize/d' gradle.properties
          fi

          # 2. FORCE a correct settings.gradle (Fixes the "No Repositories" error)
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FaitSystemAgent"
          include ':app'
          EOF

          # 3. Clean up build.gradle so it doesn't conflict with the new settings
          if [ -f "build.gradle" ]; then
            sed -i 's/google()/\/\/google()/g' build.gradle
            sed -i 's/mavenCentral()/\/\/mavenCentral()/g' build.gradle
          fi

          # 4. Re-create the Wrapper directory and properties
          mkdir -p gradle/wrapper
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.12.1-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 5. Download official runner files
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradlew
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          
          # 6. Run the build
          ./gradlew clean assembleDebug --no-daemon --stacktrace
          
