name: Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # This clears the Node.js 20 warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Removed cache to prevent the Path Validation Error

      - name: Build APK
        run: |
          # Fix line endings (important if you edit on a phone)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          # Force the build and show errors if it fails
          ./gradlew assembleDebug --stacktrace

      - name: Upload Artifact
        if: always() # This runs even if the build fails so you can see why
        uses: actions/upload-artifact@v4
        with:
          name: prototype-apk
          # This search pattern finds the APK no matter where it is hidden
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
