name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          # Fix line endings (critical for edits made on Android devices)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          # Execute the build
          ./gradlew assembleDebug --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Error-EXE-Beta
          # Using a recursive glob pattern to ensure the APK is found regardless of directory structure
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
