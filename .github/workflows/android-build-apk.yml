name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Force Repair and Build
        run: |
          # 1. Ensure directories exist
          mkdir -p gradle/wrapper
          
          # 2. Download a guaranteed fresh Wrapper JAR
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          
          # 3. Download a guaranteed fresh gradlew shell script
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradlew
          
          # 4. Fix permissions and line endings
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          
          # 5. RUN THE BUILD (added --info to see exactly what happens)
          ./gradlew assembleDebug --info --stacktrace

      - name: Find and Upload APK
        id: find_apk
        run: |
          APK_PATH=$(find . -type f -name "*.apk" | grep -v "intermediates" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Still no APK. Printing full logs for debug:"
            ls -R
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          
