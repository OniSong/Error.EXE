    - name: Force Clean Configuration
      run: |
        # Write a fresh settings.gradle that allows Google/Maven access
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Error.EXE"
        include ':app'
        EOF

        # Ensure the root build.gradle is pointing to the right plugin
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:8.1.0"
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        # Make sure the build script is executable
        chmod +x gradlew
        
