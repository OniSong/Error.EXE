name: Build Debug APK and Upload to Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget lib32stdc++6 lib32z1

      - name: Install Android SDK commandline tools
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          SDK_URL="https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          wget -qO cmdline_tools.zip "${SDK_URL}"
          unzip -q cmdline_tools.zip -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Export Android env vars
        run: |
          echo "ANDROID_SDK_ROOT=${RUNNER_TEMP}/android-sdk" >> $GITHUB_ENV
          echo "${RUNNER_TEMP}/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          ./gradlew clean assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.java-home }}

      - name: Find debug APK
        id: find_apk
        run: |
          set -e
          apk=$(find . -type f -name "*-debug.apk" | head -n 1 || true)
          if [ -z "$apk" ]; then
            echo "No debug APK found."
            exit 1
          fi
          echo "apk_path=$apk" >> $GITHUB_OUTPUT

      - name: Show APK path
        run: echo "APK built at: ${{ steps.find_apk.outputs.apk_path }}"

      - name: Upload APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: apk-artifacts
          APK_PATH: ${{ steps.find_apk.outputs.apk_path }}
        run: |
          node --version || true
          # Install node if missing
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          npm install --no-save npm:@supabase/supabase-js@2
          node .github/scripts/upload-to-supabase.js

      - name: Create GitHub Actions artifact (fallback)
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
