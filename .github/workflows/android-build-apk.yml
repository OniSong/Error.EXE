name: Minimal Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: Basic Build
        run: |
          if [ -f "gradle.properties" ]; then
            sed -i '/MaxPermSize/d' gradle.properties
          fi
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "FaitSystemAgent"
          include ':app'
          EOF
          if [ -f "build.gradle" ]; then
            sed -i 's/google()/\/\/google()/g' build.gradle
            sed -i 's/mavenCentral()/\/\/mavenCentral()/g' build.gradle
          fi
          mkdir -p gradle/wrapper
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.12.1-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradlew
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/*.apk"
          
