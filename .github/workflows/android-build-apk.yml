name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Force Repair and Build
        run: |
          # 1. Strip the dead JVM settings again
          if [ -f "gradle.properties" ]; then
            sed -i '/MaxPermSize/d' gradle.properties
          fi

          # 2. Repair common repository syntax errors in build.gradle
          # This ensures 'google()' and 'mavenCentral()' are properly formatted
          sed -i 's/repository {/repositories {/g' build.gradle
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle

          # 3. Create Wrapper structure
          mkdir -p gradle/wrapper
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.12.1-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 4. Grab official runner files
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradlew
          chmod +x gradlew
          sed -i 's/\r$//' gradlew
          
          # 5. Build - Using --stacktrace to see the EXACT line of the error if it fails
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find and Upload APK
        id: find_apk
        run: |
          APK_PATH=$(find . -type f -name "*.apk" | grep -v "intermediates" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Build ran but no APK found."
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          
