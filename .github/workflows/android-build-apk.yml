Name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Ensure gradlew is valid and build APK
        run: |
          # Fix line endings and permissions
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # Run the build
          ./gradlew assembleDebug --stacktrace

      - name: Find APK path
        id: find_apk
        run: |
          # Look specifically in the build output folder
          APK_PATH=$(find app/build/outputs/apk/debug -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Build failed to produce an APK. Check the Gradle logs above." >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          
