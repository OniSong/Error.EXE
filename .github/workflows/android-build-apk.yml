name: Build Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build APK with Auto-Wrapper Fix
        run: |
          # 1. Ensure the wrapper directory exists
          mkdir -p gradle/wrapper
          
          # 2. Check for and download the JAR if it's missing
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading missing gradle-wrapper.jar..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.12.1/gradle/wrapper/gradle-wrapper.jar
          fi

          # 3. Fix line endings (crucial when editing on Android) and permissions
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # 4. Run the actual build
          ./gradlew assembleDebug --stacktrace

      - name: Find APK path
        id: find_apk
        run: |
          # Finds the APK in the standard output directory
          APK_PATH=$(find app/build/outputs/apk/debug -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Build finished but no APK was found in app/build/outputs/apk/debug" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          
