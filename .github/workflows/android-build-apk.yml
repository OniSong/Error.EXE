name: Android CI - Prototype Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Force Project Configuration
      run: |
        # 1. Create a clean settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "Error.EXE"
        include ':app'
        EOF

        # 2. Fix the root build.gradle
        cat << 'EOF' > build.gradle
        buildscript {
            dependencies {
                classpath "com.android.tools.build:gradle:8.1.0"
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0"
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        # 3. Ensure the Gradle Wrapper exists and is executable
        gradle wrapper --gradle-version 8.1
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: prototype-apk
        path: app/build/outputs/apk/debug/*.apk
